name: 💡 Feature request
description: Suggest a new module, adapter, simulation, or improvement.
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: dropdown
    id: kind
    attributes:
      label: What kind of feature?
      options:
        - New module
        - New provider / adapter
        - New simulation scenario or generator
        - UI / UX improvement
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Focus on the user pain, not the implementation.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: contribution
    attributes:
      label: Would you like to work on this?
      options:
        - label: I'd be willing to open a PR for this feature.
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's [Code of Conduct](../CODE_OF_CONDUCT.md).
          required: true
